[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 5
# 防止长时间任务时 WebSocket 断连
enableWebsocketCompression = false
maxMessageSize = 200

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#4F46E5"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F7FF"
textColor = "#1E1E2E"
font = "sans serif"
